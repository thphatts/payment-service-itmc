version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: payment_itmc_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment_itmc_db
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    container_name: payment_itmc_redis
    ports:
      - "6379:6379"