services:
  mysql:
    image: mysql:8.0
    container_name: fund-mysql
    platform: linux/arm64
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: club_fund
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: always

  redis:
    image: redis:7-alpine
    container_name: fund-redis
    platform: linux/arm64
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    restart: always

  backend:
    build: .
    container_name: fund-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/club_fund?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  frontend:
    build: ./clubsphere-frontend
    container_name: fund-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    container_name: fund-ngrok
    command:
      - http
      - frontend:80
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - frontend
    restart: always

volumes:
  mysql_data: