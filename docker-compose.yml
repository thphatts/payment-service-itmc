services:
  mysql:
    image: mysql:8.0
    container_name: fund-mysql
    platform: linux/arm64
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=club_fund
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fund-redis
    platform: linux/arm64
    command: redis-server --requirepass ${REDIS_PASSWORD} --ignore-warnings ARM64-COW-BUG
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: fund-backend
    ports:
      - "8080:8080"
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - BANK_ID=${BANK_ID}
      - BANK_ACCOUNT_NO=${BANK_ACCOUNT_NO}
      - BANK_ACCOUNT_NAME=${BANK_ACCOUNT_NAME}
      - PAYOS_CLIENT_ID=${PAYOS_CLIENT_ID}
      - PAYOS_API_KEY=${PAYOS_API_KEY}
      - PAYOS_CHECKSUM_KEY=${PAYOS_CHECKSUM_KEY}
      - SPRING_DATASOURCE_URL=jdbc:mysql://fund-mysql:3306/club_fund?createDatabaseIfNotExist=true
      - SPRING_DATA_REDIS_HOST=fund-redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started